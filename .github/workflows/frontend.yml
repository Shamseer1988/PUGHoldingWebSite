# Phase B-6 — frontend CI.
#
# Four gates the local "frontend work is done" checklist already runs,
# now enforced in CI:
#
#   1. ``npm run type-check`` — ``tsc --noEmit``. Strict-mode contract.
#   2. ``npm run lint`` — ``next lint``. Style + Next-specific rules.
#   3. ``npm test`` — Vitest. Component + hook regression tests.
#   4. ``npm run build`` — ``next build``. Catches anything the other
#      three miss (route-collision, missing env defaults, etc.).
#
# All env vars consumed by the build have safe fallbacks in
# ``frontend/lib/env.ts`` so no secrets are needed.
name: frontend

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # ``package-lock.json`` is the cache key — invalidates on
          # any dep change.
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        # Production build catches what the unit checks above miss —
        # route collisions, env-default regressions, etc.
        run: npm run build
