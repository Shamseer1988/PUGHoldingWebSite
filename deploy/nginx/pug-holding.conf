# ============================================================
#  Paris United Group Holding — Nginx site config
#  Place at: /etc/nginx/sites-available/pug-holding.conf
#  Enable:   ln -sf .../sites-available/pug-holding.conf .../sites-enabled/
# ============================================================

# --- Upstream definitions ----------------------------------------------------
upstream pug_backend  { server 127.0.0.1:8000; keepalive 16; }
upstream pug_frontend { server 127.0.0.1:3000; keepalive 16; }

# --- HTTP → HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name parisunitedgroup.com www.parisunitedgroup.com;

    # Acme challenge passthrough (kept here in case you ever switch from
    # Cloudflare Origin Certs to Let's Encrypt direct on the origin).
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parisunitedgroup.com www.parisunitedgroup.com;

    # Cloudflare Origin Certificate (Step 6 in deployment-guide.md).
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # --- Limits & timeouts ---------------------------------------------------
    # 20 MB matches MAX_UPLOAD_SIZE_MB in the backend .env so CV uploads
    # aren't truncated at the proxy layer.
    client_max_body_size 20m;
    client_body_timeout  60s;
    send_timeout         60s;

    # --- Security headers ----------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- Logs ----------------------------------------------------------------
    access_log /var/log/nginx/pug-access.log;
    error_log  /var/log/nginx/pug-error.log warn;

    # --- Gzip ----------------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_proxied        any;
    gzip_types          text/plain text/css text/javascript
                        application/javascript application/json
                        application/xml image/svg+xml font/woff2;

    # --- Uploads served directly by Nginx (cache-friendly) -------------------
    # FastAPI also serves /api/v1/uploads/* but going through Python wastes
    # cycles for static files. Nginx serves the file off disk and only
    # proxies to FastAPI as a fallback (e.g. for newly written files that
    # haven't synced if you ever split storage).
    location /api/v1/uploads/ {
        alias /var/www/pug/uploads/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri @api;
    }

    # --- API proxy -----------------------------------------------------------
    location /api/ {
        proxy_pass         http://pug_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;        # so streaming endpoints work
    }

    # --- Internal fallback for the upload alias above ------------------------
    location @api {
        proxy_pass         http://pug_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Next.js static assets (immutable, hashed filenames) -----------------
    location /_next/static/ {
        proxy_pass         http://pug_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Everything else → Next.js -------------------------------------------
    location / {
        proxy_pass         http://pug_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
