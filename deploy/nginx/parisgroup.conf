# ============================================================
#  Paris United Group corporate website — Nginx site config.
#  Place at:  /etc/nginx/sites-available/parisgroup
#  Enable:    ln -sf .../sites-available/parisgroup .../sites-enabled/
#
#  Coexists with the existing PUG Accounts app served at
#  pugfinapp.parisunitedgroup.com (do NOT edit that file).
#
#  Two phases:
#   1. Start with the HTTP-only block while you set up the box.
#   2. After the Cloudflare Origin Cert is on the server, swap to
#      the HTTPS block at the bottom of the file (commented out).
# ============================================================

# -------------------- Phase 1: HTTP only --------------------
server {
    listen 80;
    listen [::]:80;

    server_name parisunitedgroup.com www.parisunitedgroup.com;

    # 20 MB matches MAX_UPLOAD_SIZE_MB in the backend .env so CV
    # uploads aren't truncated at the proxy layer.
    client_max_body_size 20m;

    access_log /var/log/nginx/parisgroup-access.log;
    error_log  /var/log/nginx/parisgroup-error.log warn;

    # Gzip for text payloads.
    gzip                on;
    gzip_vary           on;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_proxied        any;
    gzip_types          text/plain text/css text/javascript
                        application/javascript application/json
                        application/xml image/svg+xml font/woff2;

    # Uploads served straight off disk — FastAPI also mounts this
    # path but going through Python wastes cycles for static files.
    location /api/v1/uploads/ {
        alias /var/www/pug/uploads/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # API proxy.
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8000/api/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;   # streaming endpoints work
    }

    # Next.js static assets — long-cache, hashed filenames.
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Everything else → Next.js.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
    }
}

