# =============================================================================
# Production Nginx config — baked into the deploy/docker stack
# =============================================================================
# Mounted into the nginx container by docker-compose.prod.yml as
# /etc/nginx/conf.d/default.conf (read-only). The Nginx image's
# nginx.conf already does ``include /etc/nginx/conf.d/*.conf`` so
# this file is the only site config in play.
#
# Two responsibilities:
#
#   1. Terminate TLS using the Cloudflare Origin Certificate.
#      Origin certs are 15-year, only valid against Cloudflare, so we
#      use them instead of Let's Encrypt — no renewal cron, no ACME
#      challenge ports to worry about.
#
#   2. Route requests:
#        /api/v1/ws/    -> backend (WebSocket upgrade for HR realtime)
#        /api/         -> backend (FastAPI)
#        /_next/static/ -> frontend (long-cache for hashed assets)
#        /uploads/      -> filesystem (legacy local-storage uploads)
#        everything   -> frontend (Next.js)
#
# Pre-flight: drop Cloudflare-issued cert files into
# deploy/docker/tls/ on the host:
#
#   deploy/docker/tls/origin.crt   (full cert chain from Cloudflare)
#   deploy/docker/tls/origin.key   (private key, chmod 600)
#
# Then ``docker compose -f docker-compose.prod.yml up -d --build``.
#
# If you need to test the box without TLS first (e.g. before DNS has
# propagated), comment out the 443 server block and run just the
# port-80 block — the rest of the stack works the same.
# =============================================================================

# Upstream resolution
# -------------------
# We deliberately do NOT use ``upstream { server backend:8000; }`` blocks
# here. Nginx resolves the hostname inside an upstream block exactly
# once — at startup — and caches the result for the lifetime of the
# worker. On Docker Compose every ``docker compose up -d backend`` (or
# any container recreate) hands the container a fresh IP off the
# bridge network, and nginx then keeps trying the dead old IP and
# returns 502 until the proxy itself is restarted.
#
# Instead we point nginx at Docker's embedded resolver (always
# ``127.0.0.11`` inside a user-defined compose network), give the
# answer a short TTL, and reference the upstream through a variable
# in each ``proxy_pass``. The variable forces nginx to re-resolve on
# every request (subject to the TTL), so backend/frontend recreates
# are picked up automatically with no nginx restart.
#
# Trade-off: we lose the per-upstream keepalive connection pool — each
# request opens a fresh TCP connection to the upstream. For a small
# single-host deploy this is fine; if traffic grows, swap back to
# upstream blocks AND ship a sidecar that ``nginx -s reload``s on
# container events.
resolver            127.0.0.11 valid=10s ipv6=off;
resolver_timeout    5s;

# Common gzip block — re-used by both server blocks via inheritance.
gzip                on;
gzip_vary           on;
gzip_comp_level     6;
gzip_min_length     1024;
gzip_proxied        any;
gzip_types          text/plain text/css text/javascript
                    application/javascript application/json
                    application/xml image/svg+xml font/woff2;

# Match backend's MAX_UPLOAD_SIZE_MB so CV uploads don't get
# truncated at the proxy layer. 25 MB covers a generous PDF + 5
# MB of multipart overhead.
client_max_body_size 25M;

# --- HTTP -> HTTPS redirect --------------------------------------------------
server {
    listen      80;
    listen [::]:80;
    server_name parisunitedgroup.com www.parisunitedgroup.com _;

    # Health check — kept on plain HTTP so external monitors
    # (Cloudflare, Pingdom, the EC2 ELB health probe) can hit it
    # without needing TLS handshake quirks. Returns a tiny 200 body.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Everything else jumps to HTTPS. If you ever rotate to ACME
    # (Let's Encrypt) instead of the Cloudflare Origin Cert, add a
    # ``location /.well-known/acme-challenge/`` ABOVE the redirect.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS reverse proxy -----------------------------------------------------
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2       on;
    server_name parisunitedgroup.com www.parisunitedgroup.com;

    # Cloudflare Origin Certificate. Generated in the Cloudflare
    # dashboard: SSL/TLS -> Origin Server -> Create Certificate
    # (15-year validity, RSA 2048 or ECDSA). Save both files to
    # deploy/docker/tls/ on the EC2 host before bringing the stack
    # up — the nginx container will fail to start without them.
    ssl_certificate     /etc/nginx/tls/origin.crt;
    ssl_certificate_key /etc/nginx/tls/origin.key;

    # Mozilla Intermediate profile (Aug 2025 snapshot).
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_ciphers                "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # HSTS — once you've confirmed HTTPS works end-to-end, uncomment.
    # 31536000 = 1 year. ``preload`` is OK to add after running
    # https://hstspreload.org/ — get on the preload list once.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs go to the container's stdout / stderr so they show up in
    # ``docker compose logs nginx`` (and any log driver downstream of
    # that — CloudWatch, Loki, etc.). The nginx base image already
    # symlinks the default ``access.log`` / ``error.log`` names, but
    # those symlinks are name-specific; sending our custom-named site
    # logs to ``/dev/stdout`` and ``/dev/stderr`` keeps the docker
    # logs pipeline working without an extra entrypoint shim.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ----- WebSocket endpoint (HR realtime notifications) -----
    # Phase C-2 WebSocket manager lives at /api/v1/ws/notifications.
    # The dedicated location keeps the long-lived Upgrade header out
    # of the regular HTTP backend block (which sets Connection: "").
    location /api/v1/ws/ {
        # ``set`` + variable in proxy_pass forces per-request DNS
        # resolution via the ``resolver`` directive above. See the
        # comment near the resolver block for the full rationale.
        set $backend_upstream "backend:8000";
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ----- FastAPI backend -----
    location /api/ {
        set $backend_upstream "backend:8000";
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Critical for Phase C-5 (streaming Ask PUG AI / SSE).
        # Buffering on would coalesce chunks and break the
        # token-by-token render.
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- Static uploads (legacy local-storage path) -----
    # R2-backed installs never hit this location because the public
    # URLs go straight to the R2 custom domain. Local-storage
    # operators still rely on it — we serve those bytes off the
    # shared docker volume rather than proxying back through
    # FastAPI's StaticFiles, which would burn a worker.
    location /api/v1/uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ----- Next.js long-cache static assets -----
    location /_next/static/ {
        set $frontend_upstream "frontend:3000";
        proxy_pass         http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ----- Next.js frontend (catch-all) -----
    location / {
        set $frontend_upstream "frontend:3000";
        proxy_pass         http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 600s;
    }
}
